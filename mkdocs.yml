site_name: StorePredict
site_description: Pre-sales sizing tool for PowerStore DRR prediction
repo_url: https://github.com/fjacquet/store-predict
repo_name: fjacquet/store-predict

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - admonition
  - tables

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - User Guide:
    - Overview: user-guide/index.md
