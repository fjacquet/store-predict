site_name: StorePredict
site_description: Pre-sales sizing tool for PowerStore DRR prediction
repo_url: https://github.com/fjacquet/store-predict
repo_name: fjacquet/store-predict

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - admonition
  - tables

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - User Guide:
    - Overview: user-guide/index.md
  - Research:
    - Overview: research/index.md
    - Phase 1 - Foundation: research/phase-01-foundation.md
    - Phase 2 - Ingestion: research/phase-02-ingestion.md
    - Phase 3 - Classification: research/phase-03-classification.md
    - Phase 4 - UI Upload & Review: research/phase-04-ui.md
    - Phase 5 - Calculation & PDF: research/phase-05-calculation.md
    - Phase 6 - Polish & Deployment: research/phase-06-polish.md
    - Phase 7 - UI Enhancements: research/phase-07-ui-enhancements.md
    - Phase 8 - i18n Foundation: research/phase-08-i18n.md
    - Phase 8.1 - LiveOptics ZIP: research/phase-08.1-liveoptics-zip.md
    - Phase 9 - Excel Export: research/phase-09-excel-export.md
    - Phase 10 - PDF Branding: research/phase-10-pdf-branding.md
    - Phase 11 - LLM Classification: research/phase-11-llm-classification.md
    - Phase 12 - UX Polish: research/phase-12-ux-polish.md
  - Changelog: changelog.md
  - ADR:
    - Overview: adr/index.md
    - 001 - NiceGUI Framework: adr/001-nicegui-framework.md
    - 002 - DRR CSV Reference: adr/002-drr-csv-reference.md
    - 003 - Alias Not Fuzzy Matching: adr/003-alias-not-fuzzy-matching.md
    - 004 - DataFrame Pipeline Format: adr/004-dataframe-not-dataclass.md
    - 005 - Conservative DRR: adr/005-conservative-drr.md
    - 006 - No Mocks Testing: adr/006-no-mocks-testing.md
    - 007 - AG Grid VM Table: adr/007-aggrid-vm-table.md
    - 008 - Session Storage Split: adr/008-session-storage-split.md
    - 009 - Dialog Multi Workload: adr/009-dialog-multi-workload.md
