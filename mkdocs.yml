site_name: StorePredict
site_description: Pre-sales sizing tool for PowerStore DRR prediction
repo_url: https://github.com/fjacquet/store-predict
repo_name: fjacquet/store-predict

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - content.code.copy

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - admonition
  - tables

not_in_nav: |
  adr/0*.md
  research/phase-*.md
  research/semantic-classifier.md
  superpowers/**

# `make docs` builds with --strict (fjacquet/ci standard), which promotes
# warnings to errors. The root CHANGELOG.md (symlinked as docs/changelog.md)
# uses `docs/adr/…` link paths that are correct for GitHub's repo-root view but
# resolve wrong inside the docs/ context. Downgrade the unresolved-internal-link
# check to `info` so those cross-context links don't fail the strict build; real
# nav misconfig (omitted/absolute nav) still errors.
validation:
  nav:
    omitted_files: warn
    not_found: warn
  links:
    not_found: info
    absolute_links: info
    unrecognized_links: info

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - User Guide: user-guide/index.md
  - Architecture: architecture.md
  - PRD: prd.md
  - Changelog: changelog.md
  - Research: research/index.md
  - ADR: adr/index.md
