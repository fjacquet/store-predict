name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  id-token: write   # Sigstore OIDC token for SBOM attestation
  attestations: write  # Publish attestations to GitHub's API

jobs:
  # ── Build Python package ─────────────────────────
  python-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 (Node 24)
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0 (Node 24)
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0 (Node 24)
        with:
          version: "latest"
      - name: Install build tools
        run: pip install build
      - name: Build sdist and wheel
        run: python -m build
      - name: Install project (for SBOM scan)
        run: uv sync --frozen
      - name: Generate Python package SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0 (Node 24)
        with:
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          artifact-name: sbom.cyclonedx.json
          upload-artifact-retention: 5
      - name: Upload package artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1 (Node 24)
        with:
          name: python-package
          path: dist/

  # ── Create GitHub Release ────────────────────────
  github-release:
    needs: [python-package, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 (Node 24)
        with:
          fetch-depth: 0
      - name: Download package artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1 (Node 24)
        with:
          name: python-package
          path: dist/
      - name: Download SBOM artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1 (Node 24)
        with:
          name: sbom.cyclonedx.json
          path: sbom/
      - name: Download image SBOM artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1 (Node 24)
        with:
          name: sbom.image.cyclonedx.json
          path: sbom/
      - name: Generate release notes from CHANGELOG
        id: notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Extract section for this version from CHANGELOG.md
          NOTES=$(sed -n "/^## \\[${TAG#v}\\]/,/^## \\[/p" CHANGELOG.md | sed '$ d')
          if [ -z "$NOTES" ]; then
            NOTES="Release ${TAG}"
          fi
          {
            echo "RELEASE_NOTES<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Delete existing release if present (idempotent re-run)
        run: gh release delete "${GITHUB_REF#refs/tags/}" --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0 (Node 24)
        with:
          body: ${{ steps.notes.outputs.RELEASE_NOTES }}
          files: |
            dist/*
            sbom/sbom.cyclonedx.json
            sbom/sbom.image.cyclonedx.json
      - name: Attest Python package SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0 (attest-sbom successor)
        with:
          subject-path: dist/
          sbom-path: sbom/sbom.cyclonedx.json

  # ── Docker image ─────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 (Node 24)

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0 (Node 24)

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0 (Node 24)
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0 (Node 24)
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0 (Node 24)
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      # Standalone image SBOM (OS + Python) and a CVE gate. syft/grype pull the
      # just-pushed image via the GHCR login above.
      - name: Generate image SBOM (syft, CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0 (Node 24)
        with:
          image: ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom.image.cyclonedx.json
          artifact-name: sbom.image.cyclonedx.json
          upload-artifact-retention: 5

      - name: Scan image for known CVEs (grype)
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0 (Node 24)
        with:
          image: ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}
          severity-cutoff: high
          fail-build: true
          # Only fail on High/Critical CVEs that HAVE a fix (an upgrade or a
          # patched base image). Unfixable base-OS noise won't block the release;
          # actionable issues (like the semantic-router CVE) still do.
          only-fixed: true
          output-format: table