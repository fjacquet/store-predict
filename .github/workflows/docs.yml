name: docs
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

# Pages-from-Actions deployment (replaces the legacy gh-pages branch
# workflow which auto-spawned a deprecated Node 20 pages-build-deployment
# run on every push). See ADR-081 / commit notes.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 (Node 24)
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0 (Node 24)
        with:
          python-version: "3.12"
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5 (Node 24)
        with:
          key: mkdocs-material-${{ github.sha }}
          path: ~/.cache
          restore-keys: mkdocs-material-
      - name: Install MkDocs Material
        run: pip install mkdocs-material
      - name: Resolve symlinks for docs
        run: |
          if [ -L docs/changelog.md ]; then
            cp --remove-destination "$(readlink -f docs/changelog.md)" docs/changelog.md
          fi
      - name: Build site
        run: mkdocs build --strict || mkdocs build
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0 (Node 24)
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0 (Node 24)
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0 (Node 24)
