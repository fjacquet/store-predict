name: CI
on:
  push:
    branches: [maincd]
  pull_request:
    branches: [maincd]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv venv .venv && . .venv/bin/activate && uv pip install -e ".[dev]"
      - name: Lint and format (auto-fix)
        run: |
          . .venv/bin/activate
          ruff check --fix .
          ruff format .
      - name: Commit fixes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "style: auto-fix ruff lint + format [ci skip]"
          git push || true
      - name: Type check
        run: . .venv/bin/activate && mypy src/
      - name: Test
        run: . .venv/bin/activate && pytest --tb=short --junitxml=junit.xml -o junit_family=legacy
      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./junit.xml
          report_type: test_results
          fail_ci_if_error: false
